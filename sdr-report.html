// Shared with the spam dashboard so unlocking one unlocks the other.
// Using localStorage (survives tab close + browser restart) so the user
// doesn't have to re-enter on every visit. Cleared only on explicit logout
// or browser data wipe.
const PW_KEY = 'ameco_dash_pw_v1';

function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function decryptWith(password) {
  const enc = new TextEncoder();
  const keyMat = await crypto.subtle.importKey('raw', enc.encode(password), {name:'PBKDF2'}, false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt: b64ToBytes(PAYLOAD.salt), iterations: PAYLOAD.iterations, hash:'SHA-256' },
    keyMat,
    { name:'AES-GCM', length: 256 },
    false, ['decrypt']);
  const ptBuf = await crypto.subtle.decrypt({ name:'AES-GCM', iv: b64ToBytes(PAYLOAD.iv) }, key, b64ToBytes(PAYLOAD.ciphertext));
  return new TextDecoder().decode(ptBuf);
}

function renderUnlocked(html) { document.open(); document.write(html); document.close(); }

function showGate() {
  document.getElementById('gate').style.display = '';
  setTimeout(() => { const el = document.getElementById('pw'); if (el) el.focus(); }, 0);
}

// Try cached password from BOTH localStorage and sessionStorage.
// localStorage is the primary stickiness mechanism.
(async () => {
  try {
    const cached = localStorage.getItem(PW_KEY) || sessionStorage.getItem(PW_KEY);
    if (cached) {
      try { const html = await decryptWith(cached); renderUnlocked(html); return; }
      catch (e) { localStorage.removeItem(PW_KEY); sessionStorage.removeItem(PW_KEY); }
    }
  } catch (e) {}
  showGate();
})();

document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn'); const err = document.getElementById('err');
  const pw = document.getElementById('pw').value;
  err.textContent = ''; btn.disabled = true; btn.textContent = 'Unlocking…';
  try {
    const html = await decryptWith(pw);
    try { localStorage.setItem(PW_KEY, pw); sessionStorage.setItem(PW_KEY, pw); } catch (e) {}
    renderUnlocked(html);
  } catch (e) {
    err.textContent = 'Wrong password.';
    btn.disabled = false; btn.textContent = 'Unlock';
    document.getElementById('pw').select();
  }
});
</script>
